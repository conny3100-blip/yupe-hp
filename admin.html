<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 — ゆぺのにっき</title>
  <link rel="stylesheet" href="style.css?v=3">
  <style>
    body { background: #f2f7fc; }

    /* 共通パネル */
    .center-wrap {
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .panel-box {
      background: #fff; border: 1px solid #d8e6f0; border-radius: 4px;
      padding: 2.5rem 2.5rem 2rem; width: 100%; max-width: 400px; text-align: center;
    }
    .panel-box .panel-icon { font-size: 1.4rem; color: #c8a84a; margin-bottom: 1rem; }
    .panel-box h2 { font-size: 1rem; font-weight: normal; letter-spacing: 0.2em; color: #1e2d3a; margin-bottom: 0.3rem; }
    .panel-box p  { font-size: 0.78rem; color: #8aaabb; margin-bottom: 1.6rem; line-height: 1.8; }
    .panel-error  { color: #c0392b; font-size: 0.78rem; margin: -0.4rem 0 0.8rem; display:none; }

    /* 管理ヘッダー */
    .admin-header {
      background: #fff; border-bottom: 1px solid #d8e6f0;
      padding: 0 2rem; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header h1 { font-size: 0.85rem; font-weight: normal; letter-spacing: 0.18em; color: #4a6070; }
    .admin-header .admin-nav { display: flex; gap: 1rem; align-items: center; }
    .btn-new {
      background: #4a8ab4; color: #fff; font-size: 0.78rem;
      padding: 0.4rem 1.1rem; border-radius: 2px; border: none; cursor: pointer;
      font-family: inherit; letter-spacing: 0.08em; transition: opacity 0.2s;
    }
    .btn-new:hover { opacity: 0.82; }
    .btn-text {
      font-size: 0.75rem; color: #8aaabb; background: none; border: none;
      cursor: pointer; font-family: inherit; letter-spacing: 0.08em;
    }

    /* 管理コンテナ */
    .admin-container { max-width: 820px; margin: 2.5rem auto; padding: 0 1.5rem 4rem; }

    /* ステータスバー */
    .status-bar {
      background: #f0f7fb; border: 1px solid #d0e8f4; border-radius: 3px;
      padding: 0.7rem 1.2rem; margin-bottom: 1.5rem;
      font-size: 0.78rem; color: #4a8ab4; display: flex; align-items: center; gap: 0.5rem;
    }
    .status-bar.error { background: #fdf0ee; border-color: #f0ccc8; color: #c0392b; }
    .status-bar.success { background: #edf7f2; border-color: #b8e2ca; color: #2e7d52; }

    /* 記事テーブル */
    .post-table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d8e6f0; }
    .post-table th {
      font-size: 0.72rem; letter-spacing: 0.12em; color: #8aaabb;
      padding: 0.7rem 1.2rem; text-align: left; background: #f8fbfd;
      border-bottom: 1px solid #d8e6f0; font-weight: normal;
    }
    .post-table td { padding: 1rem 1.2rem; border-bottom: 1px solid #eef4f8; font-size: 0.88rem; color: #2a3d50; vertical-align: middle; }
    .post-table tr:last-child td { border-bottom: none; }
    .post-table .td-title { font-weight: 500; max-width: 380px; }
    .post-table .td-date  { font-size: 0.78rem; color: #8aaabb; white-space: nowrap; }
    .post-table .td-actions { white-space: nowrap; }
    .btn-edit {
      font-size: 0.75rem; color: #4a8ab4; background: none; border: 1px solid #c5dff0;
      padding: 0.3rem 0.8rem; border-radius: 2px; cursor: pointer; font-family: inherit;
      margin-right: 0.4rem; transition: background 0.15s;
    }
    .btn-edit:hover { background: #edf5fd; }
    .btn-delete {
      font-size: 0.75rem; color: #c0392b; background: none; border: 1px solid #f0ccc8;
      padding: 0.3rem 0.8rem; border-radius: 2px; cursor: pointer; font-family: inherit;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #fdf0ee; }
    .view-link { font-size: 0.75rem; color: #4a8ab4; text-decoration: none; margin-left: 0.4rem; }
    .empty-msg { text-align: center; padding: 3rem; color: #8aaabb; font-size: 0.88rem; }

    /* エディタ */
    .editor-panel { background: #fff; border: 1px solid #d8e6f0; border-radius: 4px; padding: 2rem; }
    .editor-panel h2 {
      font-size: 0.85rem; font-weight: normal; letter-spacing: 0.2em;
      color: #4a6070; margin-bottom: 1.8rem; padding-bottom: 1rem;
      border-bottom: 1px solid #eef4f8;
    }
    .editor-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .editor-full { margin-bottom: 1rem; }
    .editor-label { font-size: 0.75rem; letter-spacing: 0.1em; color: #4a6070; display: block; margin-bottom: 0.4rem; }
    .editor-input, .editor-textarea {
      width: 100%; border: 1px solid #d8e6f0; border-radius: 2px;
      padding: 0.65rem 0.85rem; font-size: 0.9rem; font-family: inherit;
      color: #1e2d3a; background: #fafcfe; outline: none; box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .editor-input:focus, .editor-textarea:focus { border-color: #4a8ab4; background: #fff; }
    .editor-textarea { resize: vertical; line-height: 1.8; min-height: 240px; }
    .editor-actions { display: flex; gap: 0.8rem; margin-top: 1.5rem; align-items: center; flex-wrap: wrap; }
    .btn-save {
      background: #1e2d3a; color: #fff; border: none; padding: 0.7rem 2rem;
      font-size: 0.82rem; letter-spacing: 0.12em; font-family: inherit;
      cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.8; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }
    .btn-cancel {
      background: none; border: 1px solid #d8e6f0; color: #8aaabb;
      padding: 0.7rem 1.4rem; font-size: 0.82rem; letter-spacing: 0.1em;
      font-family: inherit; cursor: pointer; border-radius: 2px; transition: background 0.15s;
    }
    .btn-cancel:hover { background: #f2f7fc; }
    .save-msg { font-size: 0.78rem; color: #2e7d52; margin-left: 0.3rem; }
    .save-msg.err { color: #c0392b; }

    /* 画像ボタン */
    .img-upload-btn {
      font-size: 0.78rem; color: #4a8ab4; background: #edf5fd;
      border: 1px solid #c5dff0; padding: 0.4rem 0.9rem;
      border-radius: 2px; cursor: pointer; font-family: inherit;
    }

    /* token入力 */
    .token-note {
      background: #f8fbfd; border: 1px solid #d8e6f0; border-radius: 3px;
      padding: 1rem 1.2rem; font-size: 0.78rem; color: #4a6070;
      text-align: left; margin-bottom: 1.5rem; line-height: 1.8;
    }
    .token-note a { color: #4a8ab4; }
    .token-note code { background: #eef4f8; padding: 1px 5px; border-radius: 2px; font-size: 0.85em; }

    @media(max-width:600px) {
      .editor-grid { grid-template-columns: 1fr; }
      .post-table .td-title { max-width: 160px; word-break: break-all; }
    }
  </style>
</head>
<body>

<!-- ① トークン設定画面 -->
<div class="center-wrap" id="tokenWrap" style="display:none;">
  <div class="panel-box" style="max-width:480px;">
    <div class="panel-icon">✝</div>
    <h2>初回設定</h2>
    <p>記事を保存するために<br>GitHubのトークンを設定してください</p>
    <div class="token-note">
      <b>取得手順：</b><br>
      1. <a href="https://github.com/settings/tokens/new?scopes=repo&description=yupe-blog" target="_blank">こちら</a>からトークンを作成<br>
      2. "repo" にチェックが入っていることを確認<br>
      3. 「Generate token」→ 表示された文字列をコピー<br>
      4. 下に貼り付けて「保存」
    </div>
    <div class="contact-form" style="text-align:left;">
      <div class="form-group">
        <label class="form-label" for="tokenInput">GitHub Token</label>
        <input class="form-input" type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <p class="panel-error" id="tokenError">トークンが正しくありません</p>
      <button class="form-submit" onclick="saveToken()" style="width:100%;text-align:center;">保存して続ける →</button>
    </div>
  </div>
</div>

<!-- ② ログイン画面 -->
<div class="center-wrap" id="loginWrap" style="display:none;">
  <div class="panel-box">
    <div class="panel-icon">✝</div>
    <h2>ゆぺのにっき</h2>
    <p>管理画面へようこそ</p>
    <div class="contact-form" style="text-align:left;">
      <div class="form-group">
        <label class="form-label" for="pw">パスワード</label>
        <input class="form-input" type="password" id="pw" placeholder="パスワードを入力" autocomplete="current-password">
      </div>
      <p class="panel-error" id="loginError">パスワードが違います</p>
      <button class="form-submit" onclick="doLogin()" style="width:100%;text-align:center;">ログイン →</button>
    </div>
    <p style="margin-top:1.2rem;font-size:0.72rem;color:#b0c8d8;">初期パスワード: <code style="background:#f0f7fb;padding:2px 6px;border-radius:2px;">yupe</code></p>
  </div>
</div>

<!-- ③ 管理画面 -->
<div id="adminApp" style="display:none;">
  <header class="admin-header">
    <h1>✝ 管理画面</h1>
    <div class="admin-nav">
      <a href="index.html" target="_blank" style="font-size:0.75rem;color:#8aaabb;">サイトを見る ↗</a>
      <button class="btn-new" onclick="showEditor(null)">＋ 新規投稿</button>
      <button class="btn-text" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <div class="admin-container">
    <div id="statusBar" class="status-bar" style="display:none;"></div>

    <!-- 記事一覧 -->
    <div id="listView">
      <table class="post-table">
        <thead>
          <tr>
            <th>タイトル</th>
            <th>日付</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="postTableBody">
          <tr><td colspan="3" class="empty-msg">読み込み中…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- エディタ -->
    <div id="editorView" style="display:none;">
      <div class="editor-panel">
        <h2 id="editorTitle">新規投稿</h2>
        <input type="hidden" id="editId">
        <div class="editor-grid">
          <div>
            <label class="editor-label" for="editPostTitle">タイトル *</label>
            <input class="editor-input" type="text" id="editPostTitle" placeholder="記事のタイトル">
          </div>
          <div>
            <label class="editor-label" for="editDate">日付 *</label>
            <input class="editor-input" type="text" id="editDate" placeholder="例：2026年4月28日">
          </div>
        </div>
        <div class="editor-full">
          <label class="editor-label" for="editExcerpt">一覧に表示する概要</label>
          <input class="editor-input" type="text" id="editExcerpt" placeholder="省略すると本文冒頭から自動生成">
        </div>
        <div class="editor-full">
          <label class="editor-label" for="editCategory">カテゴリ</label>
          <input class="editor-input" type="text" id="editCategory" placeholder="例：子ども・教育、お金・節約、健康・美容">
        </div>
        <div class="editor-full">
          <label class="editor-label" for="editBody">本文 *</label>
          <div style="display:flex;align-items:center;gap:0.7rem;margin-bottom:0.5rem;flex-wrap:wrap;">
            <button class="img-upload-btn" type="button" onclick="document.getElementById('adminImgInput').click()">📷 画像を挿入</button>
            <span style="font-size:0.72rem;color:#8aaabb;" id="adminImgStatus">JPG・PNG・GIF対応（5MB以下）</span>
            <input type="file" id="adminImgInput" accept="image/*" style="display:none" onchange="handleAdminImage(this)">
          </div>
          <textarea class="editor-textarea" id="editBody" placeholder="本文を書いてください。空行で段落が分かれます。&#10;画像は「📷 画像を挿入」ボタンで追加できます。"></textarea>
        </div>
        <div class="editor-full">
          <label class="editor-label" for="editVerse">聖書の言葉（任意）</label>
          <input class="editor-input" type="text" id="editVerse" placeholder="例：神は愛です。— ヨハネの手紙一 4:8">
        </div>
        <div class="editor-actions">
          <button class="btn-save" id="btnSave" onclick="savePost()">保存して公開する</button>
          <button class="btn-cancel" onclick="showList()">キャンセル</button>
          <span class="save-msg" id="saveMsg"></span>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const REPO    = 'conny3100-blip/yupe-hp';
  const FILE    = 'posts.json';
  const ADMIN_PW = 'yupe';

  let _posts = [];
  let _fileSha = '';

  // ===== 起動 =====
  window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('yupe_gh_token');
    if (!token) {
      show('tokenWrap');
    } else if (sessionStorage.getItem('yupe_admin')) {
      show('adminApp');
      loadPosts().then(() => {
        // ?edit=ID で直接エディタを開く
        const editId = new URLSearchParams(location.search).get('edit');
        if (editId) showEditor(editId);
      });
    } else {
      show('loginWrap');
    }
  });

  function show(id) {
    ['tokenWrap','loginWrap','adminApp'].forEach(i => {
      document.getElementById(i).style.display = (i === id) ? '' : 'none';
    });
  }

  // ===== トークン保存 =====
  async function saveToken() {
    const token = document.getElementById('tokenInput').value.trim();
    if (!token.startsWith('ghp_') && !token.startsWith('github_pat_')) {
      document.getElementById('tokenError').style.display = 'block';
      return;
    }
    localStorage.setItem('yupe_gh_token', token);
    document.getElementById('tokenError').style.display = 'none';
    show('loginWrap');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('tokenWrap').style.display !== 'none') saveToken();
  });

  // ===== ログイン =====
  function doLogin() {
    const pw = document.getElementById('pw').value;
    if (pw === ADMIN_PW) {
      sessionStorage.setItem('yupe_admin', '1');
      document.getElementById('loginError').style.display = 'none';
      show('adminApp');
      loadPosts();
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') doLogin();
  });

  function doLogout() {
    sessionStorage.removeItem('yupe_admin');
    show('loginWrap');
  }

  // ===== GitHub API =====
  function ghHeaders() {
    return {
      'Authorization': 'token ' + localStorage.getItem('yupe_gh_token'),
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json'
    };
  }

  async function loadPosts() {
    setStatus('読み込み中…', '');
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        headers: ghHeaders()
      });
      if (!res.ok) throw new Error('取得失敗 ' + res.status);
      const data = await res.json();
      _fileSha = data.sha;
      _posts = JSON.parse(atob(data.content.replace(/\n/g, '')));
      setStatus('', '');
      renderTable();
    } catch(e) {
      setStatus('読み込みエラー: ' + e.message, 'error');
    }
  }

  async function savePosts() {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(_posts, null, 2))));
    const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
      method: 'PUT',
      headers: ghHeaders(),
      body: JSON.stringify({
        message: 'ブログ記事を更新',
        content: content,
        sha: _fileSha
      })
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.message || '保存失敗');
    }
    const data = await res.json();
    _fileSha = data.content.sha;
  }

  // ===== ステータスバー =====
  function setStatus(msg, type) {
    const bar = document.getElementById('statusBar');
    if (!msg) { bar.style.display = 'none'; return; }
    bar.style.display = '';
    bar.className = 'status-bar' + (type ? ' ' + type : '');
    bar.textContent = msg;
  }

  // ===== 記事一覧 =====
  function renderTable() {
    const tbody = document.getElementById('postTableBody');
    if (_posts.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">まだ記事がありません。「新規投稿」から書いてみましょう。</td></tr>';
      return;
    }
    tbody.innerHTML = _posts.map(p => `
      <tr>
        <td class="td-title">${esc(p.title)}</td>
        <td class="td-date">${esc(p.date)}</td>
        <td class="td-actions">
          <button class="btn-edit" onclick="showEditor('${esc(p.id)}')">編集</button>
          <button class="btn-delete" onclick="confirmDelete('${esc(p.id)}')">削除</button>
          <a class="view-link" href="post.html?id=${esc(p.id)}" target="_blank">表示 ↗</a>
        </td>
      </tr>
    `).join('');
  }

  // ===== エディタ =====
  function showEditor(id) {
    document.getElementById('listView').style.display = 'none';
    document.getElementById('editorView').style.display = 'block';
    document.getElementById('saveMsg').textContent = '';
    document.getElementById('btnSave').disabled = false;

    if (id) {
      const p = _posts.find(x => String(x.id) === String(id));
      document.getElementById('editorTitle').textContent = '記事を編集';
      document.getElementById('editId').value = id;
      document.getElementById('editPostTitle').value = p.title || '';
      document.getElementById('editDate').value = p.date || '';
      document.getElementById('editExcerpt').value = p.excerpt || '';
      document.getElementById('editCategory').value = p.category || '';
      document.getElementById('editBody').value = p.body || '';
      document.getElementById('editVerse').value = p.verse || '';
    } else {
      document.getElementById('editorTitle').textContent = '新規投稿';
      document.getElementById('editId').value = '';
      document.getElementById('editPostTitle').value = '';
      document.getElementById('editDate').value = todayJa();
      document.getElementById('editExcerpt').value = '';
      document.getElementById('editCategory').value = '';
      document.getElementById('editBody').value = '';
      document.getElementById('editVerse').value = '';
    }
    document.getElementById('editPostTitle').focus();
    window.scrollTo(0, 0);
  }

  function showList() {
    document.getElementById('editorView').style.display = 'none';
    document.getElementById('listView').style.display = 'block';
  }

  async function savePost() {
    const title    = document.getElementById('editPostTitle').value.trim();
    const date     = document.getElementById('editDate').value.trim();
    const body     = document.getElementById('editBody').value.trim();
    const excerpt  = document.getElementById('editExcerpt').value.trim() || body.replace(/\n/g,' ').substring(0, 80) + '…';
    const category = document.getElementById('editCategory').value.trim();
    const verse    = document.getElementById('editVerse').value.trim();
    const editId   = document.getElementById('editId').value;

    if (!title || !body) { alert('タイトルと本文は必須です。'); return; }

    const btn = document.getElementById('btnSave');
    const msg = document.getElementById('saveMsg');
    btn.disabled = true;
    msg.textContent = '保存中…';
    msg.className = 'save-msg';

    if (editId) {
      const idx = _posts.findIndex(p => String(p.id) === String(editId));
      if (idx !== -1) _posts[idx] = { ..._posts[idx], title, date, excerpt, body, verse, category };
    } else {
      const newId = String(Date.now());
      _posts.unshift({ id: newId, title, date, excerpt, body, verse, category });
    }

    try {
      await savePosts();
      msg.textContent = '✓ 公開しました！';
      msg.className = 'save-msg';
      setTimeout(() => { showList(); setStatus('', ''); }, 1200);
    } catch(e) {
      msg.textContent = '保存失敗: ' + e.message;
      msg.className = 'save-msg err';
      btn.disabled = false;
      // 失敗したら元に戻す
      await loadPosts();
    }
  }

  async function confirmDelete(id) {
    const p = _posts.find(x => String(x.id) === String(id));
    if (!p) return;
    if (!confirm(`「${p.title}」を削除しますか？\nこの操作は元に戻せません。`)) return;

    setStatus('削除中…', '');
    _posts = _posts.filter(x => String(x.id) !== String(id));
    try {
      await savePosts();
      setStatus('削除しました', 'success');
      renderTable();
      setTimeout(() => setStatus('', ''), 2000);
    } catch(e) {
      setStatus('削除失敗: ' + e.message, 'error');
      await loadPosts();
    }
  }

  // ===== ユーティリティ =====
  // ===== 画像アップロード（管理画面） =====
  async function handleAdminImage(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { alert('5MB以下の画像を選んでください'); return; }

    const status = document.getElementById('adminImgStatus');
    status.textContent = 'アップロード中…';

    try {
      const reader = new FileReader();
      const base64 = await new Promise((res, rej) => {
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });

      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `images/${Date.now()}_${safeName}`;

      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: ghHeaders(),
        body: JSON.stringify({ message: '画像をアップロード', content: base64 })
      });
      if (!r.ok) { const d = await r.json(); throw new Error(d.message); }

      const ta = document.getElementById('editBody');
      const tag = `\n[img:${path}]\n`;
      const start = ta.selectionStart;
      ta.value = ta.value.slice(0, start) + tag + ta.value.slice(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + tag.length;
      ta.focus();

      status.textContent = '✓ 挿入しました';
      setTimeout(() => { status.textContent = 'JPG・PNG・GIF対応（5MB以下）'; }, 2000);
    } catch(e) {
      status.textContent = '失敗: ' + e.message;
    }
    input.value = '';
  }

  function todayJa() {
    const d = new Date();
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  }
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
