  <script src="blog.js"></script>
  <script>
    const id = getParam('id');
    const el = document.getElementById('postContent');

    fetchPost(id).then(post => {
      if (!post) {
        document.title = '記事が見つかりません — ゆぺのにっき';
        el.innerHTML = `<p style="text-align:center;color:#8aaabb;padding:4rem 0;">記事が見つかりませんでした。<br><a href="index.html" style="color:#4a8ab4;">← ホームに戻る</a></p>`;
        return;
      }

      document.title = post.title + ' — ゆぺのにっき';

      const bodyHtml = post.body
        .split(/\n\n+/)
        .map(para => `<p>${escHtml(para.replace(/\n/g,' '))}</p>`)
        .join('');

      const verseHtml = post.verse
        ? `<blockquote>「${escHtml(post.verse)}」</blockquote>`
        : '';

      el.innerHTML = `
        <p class="pr-notice">※ 本記事にはアフィリエイト広告（楽天・Etsy）が含まれる場合があります。</p>
        <header class="post-single-header">
          <time class="post-date">${post.date}</time>
          <h1>${escHtml(post.title)}</h1>
        </header>
        <div class="post-body">${bodyHtml}${verseHtml}</div>
        <div class="rakuten-banner">
          <span class="rakuten-banner-label">PR / 楽天でおすすめ</span>
          <div class="rakuten-banner-inner">
            <div class="rakuten-banner-img">🎁</div>
            <div class="rakuten-banner-text">
              <h4>楽天ふるさと納税</h4>
              <p>ゆぺおすすめの返礼品はこちら！ポイントも貯まってお得です。</p>
              <a class="rakuten-btn" href="https://affiliate.rakuten.co.jp/" target="_blank" rel="noopener sponsored">楽天で見る →</a>
            </div>
          </div>
        </div>
        <a class="back-link" href="index.html">← Back to Home</a>
      `;
    });
  </script>
