  <link rel="stylesheet" href="style.css?v=3">
  <style>
    /* ===== インライン編集パネル ===== */
    #inlineEditor {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,20,30,0.55);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #inlineEditor.open { display: flex; }
    .ie-panel {
      background: #fff;
      border-radius: 6px;
      width: 100%;
      max-width: 700px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }
    .ie-panel h2 {
      font-size: 0.9rem; font-weight: normal;
      letter-spacing: 0.18em; color: #4a6070;
      margin-bottom: 1.5rem; padding-bottom: 0.8rem;
      border-bottom: 1px solid #eef4f8;
    }
    .ie-label { font-size: 0.75rem; letter-spacing: 0.1em; color: #4a6070; display: block; margin-bottom: 0.4rem; }
    .ie-input, .ie-textarea {
      width: 100%; border: 1px solid #d8e6f0; border-radius: 2px;
      padding: 0.65rem 0.85rem; font-size: 0.9rem; font-family: inherit;
      color: #1e2d3a; background: #fafcfe; outline: none;
      box-sizing: border-box; margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    .ie-input:focus, .ie-textarea:focus { border-color: #4a8ab4; background: #fff; }
    .ie-textarea { resize: vertical; line-height: 1.8; min-height: 220px; }
    .ie-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .ie-actions { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; margin-top: 0.5rem; }
    .ie-btn-save {
      background: #1e2d3a; color: #fff; border: none;
      padding: 0.65rem 1.8rem; font-size: 0.82rem;
      letter-spacing: 0.12em; font-family: inherit;
      cursor: pointer; border-radius: 2px; transition: opacity 0.2s;
    }
    .ie-btn-save:hover { opacity: 0.8; }
    .ie-btn-save:disabled { opacity: 0.5; cursor: default; }
    .ie-btn-cancel {
      background: none; border: 1px solid #d8e6f0; color: #8aaabb;
      padding: 0.65rem 1.2rem; font-size: 0.82rem;
      letter-spacing: 0.1em; font-family: inherit;
      cursor: pointer; border-radius: 2px;
    }
    .ie-msg { font-size: 0.78rem; color: #2e7d52; }
    .ie-msg.err { color: #c0392b; }

    /* 画像アップロードボタン */
    .img-upload-row {
      display: flex; align-items: center; gap: 0.7rem;
      margin-bottom: 1rem; flex-wrap: wrap;
    }
    .img-upload-btn {
      font-size: 0.78rem; color: #4a8ab4; background: #edf5fd;
      border: 1px solid #c5dff0; padding: 0.4rem 0.9rem;
      border-radius: 2px; cursor: pointer; font-family: inherit;
    }
    .img-upload-note { font-size: 0.72rem; color: #8aaabb; }
    #imgFileInput { display: none; }

    /* 記事内画像 */
    .post-body img {
      max-width: 100%; border-radius: 4px;
      margin: 1rem 0; display: block;
    }

    /* 管理バー */
    #adminBar {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      background: #1e2d3a; color: #fff; border-radius: 4px;
      display: none; align-items: center; gap: 0.5rem;
      padding: 0.6rem 1rem; z-index: 499;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      font-size: 0.8rem; font-family: inherit; white-space: nowrap;
    }
    #adminBar.show { display: flex; }
    .ab-edit {
      color: #fff; background: #4a8ab4; text-decoration: none;
      padding: 0.35rem 0.9rem; border-radius: 2px; font-size: 0.78rem;
      border: none; cursor: pointer; font-family: inherit;
    }
    .ab-delete {
      color: #fff; background: #c0392b; border: none; cursor: pointer;
      padding: 0.35rem 0.9rem; border-radius: 2px; font-size: 0.78rem;
      font-family: inherit;
    }
    .ab-admin { color: #8aaabb; font-size: 0.75rem; text-decoration: none; margin-left: 0.3rem; }
  </style>

  <script src="blog.js?v=4"></script>
  <script>
    const postId = getParam('id');
    const el = document.getElementById('postContent');
    let _currentPost = null;

    // ===== 本文を HTML に変換（画像対応）=====
    function renderBody(body) {
      return body.split(/\n\n+/).map(para => {
        const t = para.trim();
        // [img:URL] を画像タグに変換
        const imgMatch = t.match(/^\[img:(.+?)\]$/);
        if (imgMatch) {
          const src = imgMatch[1];
          // GitHub Pages の絶対URLに変換
          const url = src.startsWith('http') ? src
            : 'https://conny3100-blip.github.io/yupe-hp/' + src;
          return `<img src="${url}" alt="" loading="lazy">`;
        }
        return `<p>${escHtml(para.replace(/\n/g,' '))}</p>`;
      }).join('');
    }

    // ===== 記事表示 =====
    function renderPost(post) {
      _currentPost = post;
      document.title = post.title + ' — ゆぺのにっき';

      const bodyHtml  = renderBody(post.body || '');
      const verseHtml = post.verse
        ? `<blockquote>「${escHtml(post.verse)}」</blockquote>` : '';

      el.innerHTML = `
        <p class="pr-notice">※ 本記事にはアフィリエイト広告（楽天・Etsy）が含まれる場合があります。</p>
        <header class="post-single-header">
          <time class="post-date">${post.date}</time>
          <h1>${escHtml(post.title)}</h1>
        </header>
        <div class="post-body">${bodyHtml}${verseHtml}</div>
        <div class="rakuten-banner">
          <span class="rakuten-banner-label">PR / 楽天でおすすめ</span>
          <div class="rakuten-banner-inner">
            <div class="rakuten-banner-img">🎁</div>
            <div class="rakuten-banner-text">
              <h4>楽天ふるさと納税</h4>
              <p>ゆぺおすすめの返礼品はこちら！ポイントも貯まってお得です。</p>
              <a class="rakuten-btn" href="https://affiliate.rakuten.co.jp/" target="_blank" rel="noopener sponsored">楽天で見る →</a>
            </div>
          </div>
        </div>
        <a class="back-link" href="index.html">← Back to Home</a>
      `;

      // 管理者バー表示
      if (isAdmin()) {
        document.getElementById('adminBar').classList.add('show');
      }
    }

    // ===== 初期表示 =====
    fetchPost(postId).then(post => {
      if (!post) {
        document.title = '記事が見つかりません — ゆぺのにっき';
        el.innerHTML = `<p style="text-align:center;color:#8aaabb;padding:4rem 0;">記事が見つかりませんでした。<br><a href="index.html" style="color:#4a8ab4;">← ホームに戻る</a></p>`;
        return;
      }
      renderPost(post);
    });

    // ===== インライン編集 =====
    function ieOpen() {
      if (!_currentPost) return;
      document.getElementById('ieTitle').value    = _currentPost.title || '';
      document.getElementById('ieDate').value     = _currentPost.date || '';
      document.getElementById('ieExcerpt').value  = _currentPost.excerpt || '';
      document.getElementById('ieCategory').value = _currentPost.category || '';
      document.getElementById('ieBody').value     = _currentPost.body || '';
      document.getElementById('ieVerse').value    = _currentPost.verse || '';
      document.getElementById('ieMsg').textContent = '';
      document.getElementById('ieSaveBtn').disabled = false;
      document.getElementById('inlineEditor').classList.add('open');
    }

    function ieClose() {
      document.getElementById('inlineEditor').classList.remove('open');
    }

    // 背景クリックで閉じる
    document.getElementById('inlineEditor').addEventListener('click', e => {
      if (e.target === document.getElementById('inlineEditor')) ieClose();
    });

    async function ieSave() {
      const title    = document.getElementById('ieTitle').value.trim();
      const date     = document.getElementById('ieDate').value.trim();
      const body     = document.getElementById('ieBody').value.trim();
      const excerpt  = document.getElementById('ieExcerpt').value.trim()
        || body.replace(/\[img:[^\]]+\]/g,'').replace(/\n/g,' ').substring(0, 80) + '…';
      const category = document.getElementById('ieCategory').value.trim();
      const verse    = document.getElementById('ieVerse').value.trim();

      if (!title || !body) { alert('タイトルと本文は必須です。'); return; }

      const btn = document.getElementById('ieSaveBtn');
      const msg = document.getElementById('ieMsg');
      btn.disabled = true;
      msg.textContent = '保存中…';
      msg.className = 'ie-msg';

      try {
        const posts = await ghFetchPosts();
        if (!posts) throw new Error('記事の取得に失敗しました');
        const idx = posts.findIndex(p => String(p.id) === String(postId));
        if (idx === -1) throw new Error('記事が見つかりません');
        posts[idx] = { ...posts[idx], title, date, excerpt, body, verse, category };
        await ghSavePosts(posts);
        msg.textContent = '✓ 保存しました！';
        _currentPost = posts[idx];
        renderPost(_currentPost);
        setTimeout(() => ieClose(), 1000);
      } catch(e) {
        msg.textContent = '保存失敗: ' + e.message;
        msg.className = 'ie-msg err';
        btn.disabled = false;
      }
    }

    // ===== 削除 =====
    async function doDelete() {
      if (!confirm('この記事を削除しますか？\nこの操作は元に戻せません。')) return;
      const btn = document.getElementById('abDeleteBtn');
      btn.textContent = '削除中…';
      btn.disabled = true;
      try {
        const posts = await ghFetchPosts();
        if (!posts) throw new Error('取得失敗');
        await ghSavePosts(posts.filter(p => String(p.id) !== String(postId)));
        alert('削除しました！');
        location.href = 'index.html';
      } catch(e) {
        alert('削除失敗: ' + e.message);
        btn.textContent = '🗑 削除';
        btn.disabled = false;
      }
    }

    // ===== 画像アップロード =====
    async function handleImageUpload(input) {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { alert('5MB以下の画像を選んでください'); return; }

      const status = document.getElementById('imgUploadStatus');
      status.textContent = 'アップロード中…';

      try {
        const reader = new FileReader();
        const base64 = await new Promise((res, rej) => {
          reader.onload = e => res(e.target.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(file);
        });

        const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const path = `images/${Date.now()}_${safeName}`;

        const token = localStorage.getItem('yupe_gh_token');
        const r = await fetch(`https://api.github.com/repos/conny3100-blip/yupe-hp/contents/${path}`, {
          method: 'PUT',
          headers: {
            'Authorization': 'token ' + token,
            'Accept': 'application/vnd.github+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ message: '画像をアップロード', content: base64 })
        });
        if (!r.ok) { const d = await r.json(); throw new Error(d.message); }

        // 本文テキストエリアのカーソル位置に挿入
        const ta = document.getElementById('ieBody');
        const tag = `\n[img:${path}]\n`;
        const start = ta.selectionStart;
        ta.value = ta.value.slice(0, start) + tag + ta.value.slice(ta.selectionEnd);
        ta.selectionStart = ta.selectionEnd = start + tag.length;
        ta.focus();

        status.textContent = '✓ 挿入しました';
        setTimeout(() => { status.textContent = 'JPG・PNG・GIF対応（5MB以下）'; }, 2000);
      } catch(e) {
        status.textContent = '失敗: ' + e.message;
      }
      input.value = '';
    }
  </script>
