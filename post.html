    .ql-toolbar.ql-snow {
      border: 1px solid #d8e6f0;

      font-family: inherit;

    .ql-snow .ql-picker { color: #4a6070; }
    .ql-snow .ql-stroke { stroke: #4a6070; }
    .ql-snow .ql-fill { fill: #4a6070; }
    .ql-snow.ql-toolbar button:hover .ql-stroke,
    .ql-snow.ql-toolbar button.ql-active .ql-stroke { stroke: #4a8ab4; }
    .ql-snow.ql-toolbar button:hover .ql-fill,

    /* ===== 編集オーバーレイ ===== */

    .ie-input {

    .ie-btn-cancel {

    // ===== 本文レンダリング（HTML & 旧プレーンテキスト両対応）=====
    function renderBody(body) {
      if (!body) return '';
      if (body.trim().startsWith('<')) return body; // Quill HTML
      // 旧フォーマット（プレーンテキスト + [img:...]）
      return body.split(/\n\n+/).map(para => {
        const t = para.trim();
        const imgMatch = t.match(/^\[img:(.+?)\]$/);
        if (imgMatch) {
          const src = imgMatch[1];
          const url = src.startsWith('http') ? src
            : 'https://conny3100-blip.github.io/yupe-hp/' + src;
          return `<img src="${url}" alt="" loading="lazy">`;
        }
        return `<p>${escHtml(para.replace(/\n/g,' '))}</p>`;
      }).join('');
    }

    // ===== 記事表示 =====

    // ===== Quill 初期化 =====
    function initQuill() {
      if (quill) return;
      quill = new Quill('#ieQuill', {
        theme: 'snow',
        placeholder: '本文を書いてください…',
        modules: {
          toolbar: {
            container: [
              [{ header: [1, 2, 3, false] }],
              ['bold', 'italic', 'underline', 'strike'],
              [{ color: [] }, { background: [] }],
              [{ list: 'ordered' }, { list: 'bullet' }],
              ['blockquote', 'link', 'image'],
              ['clean']
            ],
            handlers: { image: quillImageHandler }
          }
        }
      });
    }

    // Quill の画像ボタン → GitHub にアップロード
    async function quillImageHandler() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { alert('5MB以下の画像を選んでください'); return; }

        const range = quill.getSelection(true);
        quill.insertText(range.index, 'アップロード中…', { color: '#8aaabb' });

        try {
          const url = await uploadToGitHub(file);
          quill.deleteText(range.index, 7);
          quill.insertEmbed(range.index, 'image', url);
          quill.setSelection(range.index + 1);
        } catch(e) {
          quill.deleteText(range.index, 7);
          alert('画像のアップロードに失敗しました: ' + e.message);
        }
      };
      input.click();
    }

    // GitHub に画像をアップロードして URL を返す
    async function uploadToGitHub(file) {
      const reader = new FileReader();
      const base64 = await new Promise((res, rej) => {
        reader.onload = e => res(e.target.result.split(',')[1]);
        reader.onerror = rej;
        reader.readAsDataURL(file);
      });
      const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
      const path = `images/${Date.now()}_${safeName}`;
      const token = localStorage.getItem('yupe_gh_token');
      const r = await fetch(`https://api.github.com/repos/conny3100-blip/yupe-hp/contents/${path}`, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ message: '画像をアップロード', content: base64 })
      });
      if (!r.ok) { const d = await r.json(); throw new Error(d.message); }
      return `https://conny3100-blip.github.io/yupe-hp/${path}`;
    }

    // ===== インライン編集を開く =====
    function ieOpen() {
      if (!_currentPost) return;
      initQuill();
      document.getElementById('ieTitle').value    = _currentPost.title || '';
      document.getElementById('ieDate').value     = _currentPost.date || '';
      document.getElementById('ieExcerpt').value  = _currentPost.excerpt || '';
      document.getElementById('ieCategory').value = _currentPost.category || '';
      document.getElementById('ieMsg').textContent = '';
      document.getElementById('ieSaveBtn').disabled = false;

      // 本文をQuillにセット
      const body = _currentPost.body || '';
      if (body.trim().startsWith('<')) {
        quill.root.innerHTML = body;
      } else {
        // プレーンテキストをHTMLに変換してセット
        const html = body.split(/\n\n+/).map(p => `<p>${p.replace(/\n/g,' ')}</p>`).join('');
        quill.root.innerHTML = html;
      }

      document.getElementById('inlineEditor').classList.add('open');
      setTimeout(() => quill.focus(), 100);
    }

    function ieClose() {
      document.getElementById('inlineEditor').classList.remove('open');
    }
    document.getElementById('inlineEditor').addEventListener('click', e => {
      if (e.target === document.getElementById('inlineEditor')) ieClose();
    });

    // ===== 保存 =====
    async function ieSave() {
      const title    = document.getElementById('ieTitle').value.trim();
      const date     = document.getElementById('ieDate').value.trim();
      const category = document.getElementById('ieCategory').value.trim();
      const body     = quill.root.innerHTML;
      const excerpt  = document.getElementById('ieExcerpt').value.trim()
        || quill.getText().replace(/\n/g,' ').substring(0, 80) + '…';

      if (!title) { alert('タイトルを入力してください。'); return; }

      const btn = document.getElementById('ieSaveBtn');
      const msg = document.getElementById('ieMsg');
      btn.disabled = true;
      msg.textContent = '保存中…';
      msg.className = 'ie-msg';

      try {
        const posts = await ghFetchPosts();
        if (!posts) throw new Error('記事の取得に失敗しました');
        const idx = posts.findIndex(p => String(p.id) === String(postId));
        if (idx === -1) throw new Error('記事が見つかりません');
        posts[idx] = { ...posts[idx], title, date, excerpt, body, category };
        await ghSavePosts(posts);
        msg.textContent = '✓ 保存しました！';
        _currentPost = posts[idx];
        renderPost(_currentPost);
        setTimeout(() => ieClose(), 1000);
      } catch(e) {
        msg.textContent = '失敗: ' + e.message;
        msg.className = 'ie-msg err';
        btn.disabled = false;
      }
    }

    // ===== 削除 =====
    async function doDelete() {
      if (!confirm('この記事を削除しますか？\nこの操作は元に戻せません。')) return;
      const btn = document.getElementById('abDeleteBtn');
      btn.textContent = '削除中…';
      btn.disabled = true;
      try {
        const posts = await ghFetchPosts();
        if (!posts) throw new Error('取得失敗');
        await ghSavePosts(posts.filter(p => String(p.id) !== String(postId)));
        alert('削除しました！');
        location.href = 'index.html';
      } catch(e) {
        alert('削除失敗: ' + e.message);
        btn.textContent = '🗑 削除';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
