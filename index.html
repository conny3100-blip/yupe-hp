  <script src="blog.js?v=6"></script>
  <script>
    const thumbClasses = ['thumb-1','thumb-2','thumb-3'];
    const grid = document.getElementById('postGrid');
    let _allPosts = [];
    let _currentCat = 'all';

    fetchPosts().then(posts => {
      _allPosts = posts;
      if (posts.length === 0) {
        grid.innerHTML = '<p style="text-align:center;color:#8aaabb;padding:3rem 0;font-size:0.9rem;">まだ記事がありません。</p>';
      } else {
        renderGrid(posts);
      }

      // カテゴリフィルター
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          _currentCat = btn.dataset.cat;
          document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          const filtered = _currentCat === 'all'
            ? _allPosts
            : _allPosts.filter(p => p.category === _currentCat);
          renderGrid(filtered);
        });
      });
    });

    function renderGrid(posts) {
      grid.innerHTML = posts.map((p, i) => `
        <article class="post-card" data-cat="${escHtml(p.category || '')}">
          <a href="post.html?id=${p.id}">
            <div class="post-card-thumb ${p.thumbnail ? '' : thumbClasses[i % 3]}">
              ${p.thumbnail
                ? `<img src="${escHtml(p.thumbnail)}" alt="${escHtml(p.title)}" loading="lazy">`
                : '<span class="post-card-thumb-cross">✝</span>'}
            </div>
            ${p.category ? `<span class="post-card-cat">${escHtml(p.category)}</span>` : ''}
            <time class="post-date">${p.date}</time>
            <h2 class="post-title">${escHtml(p.title)}</h2>
            <p class="post-excerpt">${escHtml(p.excerpt)}</p>
          </a>
        </article>
      `).join('');

      // 管理者ログイン中はカードに編集・削除ボタンを追加
      if (isAdmin()) {
        document.querySelectorAll('.post-card').forEach((card, i) => {
          renderAdminCardButtons(posts[i].id, card);
        });
      }
    }
  </script>
