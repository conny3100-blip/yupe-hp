<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ゆぺのにっき</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <nav class="top-nav">
    <a class="nav-logo" href="index.html">✝ ゆぺのにっき</a>
    <ul class="nav-links">
      <li><a href="index.html">ホーム</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <section class="page-hero">
    <h1 class="page-hero-title">Contact</h1>
    <p class="page-hero-sub">お気軽にメッセージをどうぞ</p>
  </section>

  <main class="contact-wrap">

    <p class="contact-intro">ご質問・ご感想・ショップへのお問い合わせなど、なんでもお気軽にどうぞ。<br>できる限り返信いたします。</p>

    <!-- Formspree を使った送信フォーム -->
    <!-- action の YOUR_FORM_ID を formspree.io で取得したIDに変更してください -->
    <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">

      <div class="form-group">
        <label class="form-label" for="name">お名前 <span class="required">*</span></label>
        <input class="form-input" type="text" id="name" name="name" placeholder="山田 花子" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">メールアドレス <span class="required">*</span></label>
        <input class="form-input" type="email" id="email" name="email" placeholder="example@mail.com" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="subject">件名</label>
        <input class="form-input" type="text" id="subject" name="subject" placeholder="例：商品について">
      </div>

      <div class="form-group">
        <label class="form-label" for="message">メッセージ <span class="required">*</span></label>
        <textarea class="form-textarea" id="message" name="message" rows="6" placeholder="メッセージをご入力ください" required></textarea>
      </div>

      <button class="form-submit" type="submit">送信する →</button>

    </form>

    <p class="contact-note">
      ✝ Powered by <a href="https://formspree.io" target="_blank" rel="noopener">Formspree</a><br>
      <small>※ 送信機能を有効にするには <a href="https://formspree.io" target="_blank">formspree.io</a> で無料登録してフォームIDを取得し、<code>YOUR_FORM_ID</code> を置き換えてください。</small>
    </p>

  </main>

  <footer class="site-footer">
    <span class="footer-cross">✝</span>
    <p class="footer-title">ゆぺのにっき</p>
    <p class="footer-copy">&copy; 2026 ゆぺ</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
