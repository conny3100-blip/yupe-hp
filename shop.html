<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — ゆぺのにっき</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

  <nav class="top-nav">
    <a class="nav-logo" href="index.html">✝ ゆぺのにっき</a>
    <ul class="nav-links">
      <li><a href="index.html">ホーム</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <section class="page-hero">
    <h1 class="page-hero-title">Shop</h1>
    <p class="page-hero-sub">Etsyにてお買い求めいただけます</p>
  </section>

  <main class="container">

    <!-- Etsyバナー -->
    <div class="etsy-banner">
      <div class="etsy-banner-inner">
        <p class="etsy-banner-text">ゆぺのショップはEtsyで出店しています。<br>下のボタンからご覧ください。</p>
        <a class="etsy-btn" href="https://www.etsy.com" target="_blank" rel="noopener">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:6px;"><path d="M10.001 0C4.479 0 0 4.477 0 10s4.479 10 10.001 10C15.522 20 20 15.523 20 10S15.522 0 10.001 0zm4.424 6.027l-.34 1.613H12.37v5.934c0 .34.17.51.51.51h1.204l-.34 1.614H9.66c-.34 0-.51-.17-.51-.51v-7.548H7.936l.34-1.613h6.149z"/></svg>
          Etsyショップを見る →
        </a>
      </div>
    </div>

    <!-- 商品グリッド（サンプル） -->
    <div class="section-header" style="padding-top:3rem;">
      <h2>Items</h2>
      <div class="section-line"></div>
    </div>

    <div class="shop-grid">

      <div class="shop-card">
        <div class="shop-card-thumb thumb-1">
          <span class="shop-card-icon">✝</span>
        </div>
        <div class="shop-card-body">
          <p class="shop-card-label">handmade</p>
          <h3 class="shop-card-name">商品名（準備中）</h3>
          <p class="shop-card-price">¥ ―</p>
          <a class="shop-card-btn" href="https://www.etsy.com" target="_blank" rel="noopener">Etsyで購入</a>
        </div>
      </div>

      <div class="shop-card">
        <div class="shop-card-thumb thumb-2">
          <span class="shop-card-icon">✝</span>
        </div>
        <div class="shop-card-body">
          <p class="shop-card-label">handmade</p>
          <h3 class="shop-card-name">商品名（準備中）</h3>
          <p class="shop-card-price">¥ ―</p>
          <a class="shop-card-btn" href="https://www.etsy.com" target="_blank" rel="noopener">Etsyで購入</a>
        </div>
      </div>

      <div class="shop-card">
        <div class="shop-card-thumb thumb-3">
          <span class="shop-card-icon">✝</span>
        </div>
        <div class="shop-card-body">
          <p class="shop-card-label">handmade</p>
          <h3 class="shop-card-name">商品名（準備中）</h3>
          <p class="shop-card-price">¥ ―</p>
          <a class="shop-card-btn" href="https://www.etsy.com" target="_blank" rel="noopener">Etsyで購入</a>
        </div>
      </div>

    </div>

    <p class="shop-note">※ 商品の詳細・在庫はEtsyショップにてご確認ください。</p>

  </main>

  <footer class="site-footer">
    <span class="footer-cross">✝</span>
    <p class="footer-title">ゆぺのにっき</p>
    <p class="footer-copy">&copy; 2026 ゆぺ</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
